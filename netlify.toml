[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173

# Redirecionar /api/* para as Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback — todas as rotas vão para o index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
